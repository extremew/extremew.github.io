---
layout: default
---

<div class="page-container">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
  </header>

  <main class="page-content">
    {{ content }}
  </main>
</div>

<style>
.page-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem;
}

.page-header {
  margin-bottom: 2rem;
  border-bottom: 1px solid var(--color-border, #30363d);
  padding-bottom: 1rem;
}

.page-header h1 {
  font-size: 2.5em;
  margin: 0;
}

.page-content {
  font-size: 1.05em;
  line-height: 1.8;
}

.page-content h2 {
  margin-top: 2rem;
  margin-bottom: 1rem;
}

.page-content h3 {
  margin-top: 1.5rem;
  margin-bottom: 0.75rem;
}

.page-content ul,
.page-content ol {
  margin-left: 2rem;
  margin-bottom: 1.5rem;
}

.page-content li {
  margin-bottom: 0.5rem;
}

.page-content code {
  background: var(--color-surface, #161b22);
  padding: 0.2rem 0.4rem;
}

.page-content pre {
  background: var(--color-surface, #161b22);
  border: 1px solid var(--color-border, #30363d);
  margin: 1.5rem 0;
  padding: 1rem;
  overflow-x: auto;
}

@media (max-width: 768px) {
  .page-container {
    padding: 1rem;
  }

  .page-header h1 {
    font-size: 1.75em;
  }

  .page-content {
    font-size: 1em;
  }
}
</style>
