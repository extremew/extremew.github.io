---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-date">📅 {{ page.date | date: "%B %d, %Y" }}</span>
      {% if page.categories %}
        <div class="post-categories">
          {% for category in page.categories %}
            <span class="badge">{{ category }}</span>
          {% endfor %}
        </div>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% if page.tags %}
    <footer class="post-footer">
      <div class="post-tags">
        <h4>Tags:</h4>
        {% for tag in page.tags %}
          <span class="badge">🏷️ {{ tag }}</span>
        {% endfor %}
      </div>
    </footer>
  {% endif %}
</article>

<style>
  .post {
    background-color: rgba(15, 20, 25, 0.5);
    border: 1px solid #626A73;
    border-radius: 8px;
    padding: 2em;
    margin: 2em 0;
  }

  .post-header {
    margin-bottom: 2em;
  }

  .post-title {
    margin: 0 0 1em 0;
    color: #FFB454;
  }

  .post-meta {
    display: flex;
    gap: 1.5em;
    align-items: center;
    color: #626A73;
    font-size: 0.95em;
  }

  .post-date {
    flex-shrink: 0;
  }

  .post-categories {
    display: flex;
    gap: 0.5em;
    flex-wrap: wrap;
  }

  .post-content {
    line-height: 1.8;
    color: #E6E1CF;
  }

  .post-footer {
    margin-top: 2em;
    padding-top: 1.5em;
    border-top: 1px solid #626A73;
  }

  .post-tags {
    display: flex;
    gap: 0.75em;
    flex-wrap: wrap;
    align-items: center;
  }

  .post-tags h4 {
    margin: 0;
  }

  @media (max-width: 600px) {
    .post {
      padding: 1.5em;
    }

    .post-meta {
      flex-direction: column;
      gap: 0.5em;
      align-items: flex-start;
    }
  }
</style>
